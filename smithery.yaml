startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      xaiApiKey:
        type: string
        description: "Your xAI API key from console.x.ai"
    required:
      - xaiApiKey
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@missionsquad/mcp-grok"],
      env: {
        XAI_API_KEY: config.xaiApiKey
      }
    })
